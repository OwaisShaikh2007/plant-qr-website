<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Plant QR System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon"></div>
        <h1>Create User Account</h1>
        <p>Sign up to view campus trees and information</p>
      </div>

      <form action="#" class="login-form" id="signupForm">
        <div class="form-group" id="signupErrorContainer" style="display:none;">
          <div class="error-message" id="signupError"></div>
        </div>

        <div class="form-group">
          <label for="suName">Full Name <span class="required">*</span></label>
          <input type="text" id="suName" name="name" class="form-control" placeholder="Enter your full name" required />
        </div>

        <div class="form-group">
          <label for="suEmail">Email Address</label>
          <input type="email" id="suEmail" name="email" class="form-control" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label for="suPhone">Phone Number</label>
          <input type="tel" id="suPhone" name="phone" class="form-control" placeholder="+91 98765 43210" />
        </div>

        <div class="form-group">
          <label for="suPassword">Password <span class="required">*</span></label>
          <input type="password" id="suPassword" name="password" class="form-control" placeholder="At least 4 characters" required />
        </div>

        <div class="form-group">
          <label for="suConfirm">Confirm Password <span class="required">*</span></label>
          <input type="password" id="suConfirm" name="confirmPassword" class="form-control" placeholder="Re-enter password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign Up</button>
        <p style="margin-top:16px;color:var(--text-secondary);font-size:0.9rem;">
          Already have an account?
          <a href="user-login.html">Sign in as User</a>
        </p>
      </form>
    </div>
  </div>
  <script src="signup.js"></script>
</body>
</html>
