<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages - Plant QR System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-header">
        <h2>Plant QR</h2>
        <p>Admin Panel</p>
        <div class="user-badge">
          <span class="user-role-icon">A</span>
          <span class="user-name">Admin User</span>
        </div>
      </div>
      <ul class="nav-menu">
        <li><a href="dashboard.html" class="nav-link"><span class="icon"></span><span>Dashboard</span></a></li>
        <li class="admin-only"><a href="users.html" class="nav-link"><span class="icon"></span><span>User Credentials</span></a></li>
        <li><a href="plants.html" class="nav-link"><span class="icon"></span><span>Plants</span></a></li>
        <li class="admin-only"><a href="add-plant.html" class="nav-link"><span class="icon"></span><span>Add Plant</span></a></li>
        <li class="admin-only"><a href="admin-messages.html" class="nav-link active"><span class="icon"></span><span>Messages</span></a></li>
        <li><a href="profile.html" class="nav-link"><span class="icon"></span><span>Profile</span></a></li>
      </ul>
      <div class="sidebar-footer">
        <a href="index.html" class="btn-logout" style="text-decoration:none;color:inherit;text-align:center;"><span class="icon"></span><span>Logout</span></a>
      </div>
    </nav>
    <main class="main-content">
      <div class="content-wrapper">
        <div class="messages-page">
          <div class="page-header">
            <div>
              <h1>User Messages</h1>
              <p>View and respond to feedback, reports, and contact messages from users</p>
            </div>
          </div>

          <div class="filters-card card" style="margin-bottom:20px;">
            <div class="filters">
              <div class="filter-group">
                <label>Filter by Type:</label>
                <select id="typeFilter" class="form-control">
                  <option value="all">All Messages</option>
                  <option value="feedback">Feedback</option>
                  <option value="report">Reports</option>
                  <option value="contact">Contact</option>
                </select>
              </div>
              <div class="filter-group">
                <label>Filter by Status:</label>
                <select id="statusFilter" class="form-control">
                  <option value="all">All</option>
                  <option value="unreplied">Unreplied</option>
                  <option value="replied">Replied</option>
                </select>
              </div>
            </div>
          </div>

          <div id="messagesList" class="messages-list">
            <p class="text-center">Loading messages...</p>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Reply Modal -->
  <div id="replyModal" class="modal" style="display:none;">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Reply to User</h2>
        <button type="button" class="modal-close" onclick="closeReplyModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div id="messageDetails" style="margin-bottom:20px;padding:15px;background:#f8f9fa;border-radius:8px;">
          <!-- Message details will be shown here -->
        </div>
        <form id="replyForm">
          <input type="hidden" id="replyMessageId" />
          <div class="form-group">
            <label for="replyText">Your Reply <span class="required">*</span></label>
            <textarea id="replyText" class="form-control" rows="5" placeholder="Type your reply here..." required></textarea>
          </div>
          <div id="replyMsg" style="display:none;margin-bottom:16px;"></div>
          <div style="display:flex;gap:10px;justify-content:flex-end;">
            <button type="button" class="btn btn-outline" onclick="closeReplyModal()">Cancel</button>
            <button type="submit" class="btn btn-primary">Send Reply</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script>
    (function () {
      if (window.userRole !== "admin") {
        window.location.href = "dashboard.html";
        return;
      }

      var API = "https://plant-qr-website-production.up.railway.app";
      var messages = [];
      var filteredMessages = [];

      function escapeHtml(s) {
        if (!s) return "";
        var d = document.createElement("div");
        d.textContent = s;
        return d.innerHTML;
      }

      function formatDate(dateStr) {
        if (!dateStr) return "—";
        try {
          var d = new Date(dateStr);
          return d.toLocaleString();
        } catch {
          return dateStr;
        }
      }

      function getTypeLabel(type) {
        return {
          feedback: "Feedback",
          report: "Report",
          contact: "Contact"
        }[type] || type;
      }

      function getTypeColor(type) {
        return {
          feedback: "#2d8659",
          report: "#e74c3c",
          contact: "#3498db"
        }[type] || "#666";
      }

      function renderMessages() {
        var container = document.getElementById("messagesList");
        if (filteredMessages.length === 0) {
          container.innerHTML = "<p class=\"text-center\">No messages found.</p>";
          return;
        }

        container.innerHTML = filteredMessages.map(function (msg) {
          var typeColor = getTypeColor(msg.type);
          var hasReply = msg.adminReply ? true : false;
          var replySection = hasReply
            ? "<div style=\"margin-top:15px;padding:12px;background:#e8f5e9;border-left:3px solid #2d8659;border-radius:4px;\"><strong>Admin Reply:</strong><p style=\"margin:8px 0 0 0;\">" + escapeHtml(msg.adminReply) + "</p><small style=\"color:#666;\">Replied: " + formatDate(msg.repliedAt) + "</small></div>"
            : "";

          var replyButton = hasReply
            ? "<button type=\"button\" class=\"btn btn-outline btn-sm\" onclick=\"viewReply(" + msg.id + ")\">View Reply</button>"
            : "<button type=\"button\" class=\"btn btn-primary btn-sm\" onclick=\"openReplyModal(" + msg.id + ")\">Reply</button>";

          var details = [];
          if (msg.type === "report" && msg.subject) details.push("<strong>Subject:</strong> " + escapeHtml(msg.subject));
          if (msg.type === "report" && msg.problemType) details.push("<strong>Type:</strong> " + escapeHtml(msg.problemType));
          if (msg.email) details.push("<strong>Email:</strong> " + escapeHtml(msg.email));
          if (msg.phone) details.push("<strong>Phone:</strong> " + escapeHtml(msg.phone));

          return "<div class=\"card\" style=\"margin-bottom:16px;\">" +
            "<div style=\"display:flex;justify-content:space-between;align-items:start;margin-bottom:12px;\">" +
            "<div><span class=\"badge\" style=\"background-color:" + typeColor + ";color:white;\">" + getTypeLabel(msg.type) + "</span>" +
            (hasReply ? " <span class=\"badge badge-success\">Replied</span>" : " <span class=\"badge\" style=\"background-color:#f39c12;color:white;\">Pending</span>") +
            "</div>" +
            "<small style=\"color:#666;\">" + formatDate(msg.at) + "</small>" +
            "</div>" +
            "<div style=\"margin-bottom:12px;\">" +
            "<strong>" + escapeHtml(msg.name || "Anonymous") + "</strong>" +
            (details.length > 0 ? "<div style=\"margin-top:8px;font-size:0.9rem;color:#666;\">" + details.join(" | ") + "</div>" : "") +
            "</div>" +
            "<div style=\"padding:12px;background:#f8f9fa;border-radius:4px;margin-bottom:12px;\">" +
            "<strong>Message:</strong><p style=\"margin:8px 0 0 0;white-space:pre-wrap;\">" + escapeHtml(msg.message) + "</p>" +
            "</div>" +
            replySection +
            "<div style=\"margin-top:15px;text-align:right;\">" + replyButton + "</div>" +
            "</div>";
        }).join("");
      }

      function filterMessages() {
        var typeFilter = document.getElementById("typeFilter").value;
        var statusFilter = document.getElementById("statusFilter").value;

        filteredMessages = messages.filter(function (msg) {
          var typeMatch = typeFilter === "all" || msg.type === typeFilter;
          var statusMatch = statusFilter === "all" ||
            (statusFilter === "replied" && msg.adminReply) ||
            (statusFilter === "unreplied" && !msg.adminReply);
          return typeMatch && statusMatch;
        });

        renderMessages();
      }

      function loadMessages() {
        fetch(API + "/api/messages")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            messages = data || [];
            filterMessages();
          })
          .catch(function () {
            document.getElementById("messagesList").innerHTML = "<p class=\"text-center\" style=\"color:#e74c3c;\">Could not load messages. Is the server running?</p>";
          });
      }

      window.openReplyModal = function (messageId) {
        var msg = messages.find(function (m) { return m.id === messageId; });
        if (!msg) return;

        var details = document.getElementById("messageDetails");
        var detailsHtml = "<strong>" + escapeHtml(msg.name || "Anonymous") + "</strong><br>";
        if (msg.email) detailsHtml += "Email: " + escapeHtml(msg.email) + "<br>";
        if (msg.phone) detailsHtml += "Phone: " + escapeHtml(msg.phone) + "<br>";
        detailsHtml += "Type: " + getTypeLabel(msg.type) + "<br>";
        detailsHtml += "Date: " + formatDate(msg.at);
        if (msg.type === "report" && msg.subject) detailsHtml += "<br>Subject: " + escapeHtml(msg.subject);
        if (msg.type === "report" && msg.problemType) detailsHtml += "<br>Problem Type: " + escapeHtml(msg.problemType);
        details.innerHTML = detailsHtml;

        document.getElementById("replyMessageId").value = messageId;
        document.getElementById("replyText").value = "";
        document.getElementById("replyMsg").style.display = "none";
        document.getElementById("replyModal").style.display = "flex";
      };

      window.closeReplyModal = function () {
        document.getElementById("replyModal").style.display = "none";
      };

      window.viewReply = function (messageId) {
        openReplyModal(messageId);
        var msg = messages.find(function (m) { return m.id === messageId; });
        if (msg && msg.adminReply) {
          document.getElementById("replyText").value = msg.adminReply;
          document.getElementById("replyText").readOnly = true;
        }
      };

      document.getElementById("typeFilter").addEventListener("change", filterMessages);
      document.getElementById("statusFilter").addEventListener("change", filterMessages);

      document.getElementById("replyForm").addEventListener("submit", function (e) {
        e.preventDefault();
        var messageId = parseInt(document.getElementById("replyMessageId").value, 10);
        var replyText = document.getElementById("replyText").value.trim();
        var msgEl = document.getElementById("replyMsg");
        var btn = this.querySelector('button[type="submit"]');

        if (!replyText) {
          msgEl.style.display = "block";
          msgEl.className = "error-message";
          msgEl.textContent = "Please enter a reply message.";
          return;
        }

        btn.disabled = true;
        fetch(API + "/api/messages/" + messageId + "/reply", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ reply: replyText })
        })
          .then(function (r) { return r.json(); })
          .then(function (data) {
            msgEl.style.display = "block";
            if (data.error) {
              msgEl.className = "error-message";
              msgEl.textContent = data.error;
            } else {
              msgEl.className = "otp-success";
              msgEl.textContent = data.message || "Reply sent successfully.";
              setTimeout(function () {
                closeReplyModal();
                loadMessages();
              }, 1500);
            }
            btn.disabled = false;
          })
          .catch(function () {
            msgEl.style.display = "block";
            msgEl.className = "error-message";
            msgEl.textContent = "Could not send reply. Is the server running?";
            btn.disabled = false;
          });
      });

      // Close modal on outside click
      document.getElementById("replyModal").addEventListener("click", function (e) {
        if (e.target === this) closeReplyModal();
      });

      loadMessages();
    })();
  </script>
  <style>
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: white;
      border-radius: 8px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }
    .modal-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 {
      margin: 0;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #666;
      padding: 0;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .modal-close:hover {
      color: #000;
    }
    .modal-body {
      padding: 20px;
    }
  </style>
</body>
</html>
