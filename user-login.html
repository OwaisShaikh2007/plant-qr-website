<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Sign In - Plant QR System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon"></div>
        <h1>User Sign In</h1>
        <p>Sign in with the credentials you used during sign up</p>
      </div>

      <form action="#" class="login-form" id="userLoginForm">
        <div class="form-group" id="userLoginErrorContainer" style="display:none;">
          <div class="error-message" id="userLoginError"></div>
        </div>

        <div class="form-group">
          <label for="ulEmailOrPhone">Email or Phone <span class="required">*</span></label>
          <input type="text" id="ulEmailOrPhone" name="emailOrPhone" class="form-control" placeholder="you@example.com or phone" required />
        </div>

        <div class="form-group">
          <label for="ulPassword">Password <span class="required">*</span></label>
          <input type="password" id="ulPassword" name="password" class="form-control" placeholder="Enter your password" required />
        </div>

        <button type="submit" class="btn btn-primary btn-block">Sign In</button>
        <p style="margin-top:16px;color:var(--text-secondary);font-size:0.9rem;">
          New user?
          <a href="signup.html">Create an account</a>
        </p>
        <p style="margin-top:8px;color:var(--text-secondary);font-size:0.8rem;">
          Administrator?
          <a href="index.html">Sign in as Admin</a>
        </p>
      </form>
    </div>
  </div>
  <script src="user-login.js"></script>
</body>
</html>
