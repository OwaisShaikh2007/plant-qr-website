<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Sign In - Plant QR System</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="login-icon"></div>
        <h1>Plant QR System</h1>
        <p>Select how you want to sign in</p>
      </div>

      <form action="#" class="login-form" id="loginForm">
        <div class="form-group" id="errorContainer" style="display:none;">
          <div class="error-message" id="loginError"></div>
        </div>

        <div class="form-group">
          <label>Sign in as</label>
          <div class="user-type-selector">
            <label class="user-type-btn active">
              <input type="radio" name="loginType" value="admin" checked />
              <span class="icon">A</span>
              <span class="user-type-label">Administrator</span>
              <span class="selected-tick">✓</span>
            </label>
            <label class="user-type-btn">
              <input type="radio" name="loginType" value="user" />
              <span class="icon">U</span>
              <span class="user-type-label">User</span>
              <span class="selected-tick">✓</span>
            </label>
          </div>
        </div>

        <div id="adminFields">
          <div class="form-group">
            <label for="email">Admin Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              placeholder="Enter your email"
              required
            />
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              placeholder="Enter your admin password"
              required
            />
          </div>

          <button type="submit" class="btn btn-primary btn-block">Sign In as Admin</button>
        </div>

      </form>
    </div>
  </div>
  <script src="login.js"></script>
</body>
</html>
